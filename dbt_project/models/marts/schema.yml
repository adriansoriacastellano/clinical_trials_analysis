version: 2

models:
  - name: stg_clinical_trials
    description: "Staging model for raw clinical trials data from ClinicalTrials.gov API v2."
    columns:
      - name: nct_id
        description: "Unique ClinicalTrials.gov identifier"
        data_tests:
          - not_null
          - unique

  - name: dim_date
    description: "Calendar dimension table (2010-01-01 to 2026-12-31)."
    columns:
      - name: date_id
        data_tests:
          - not_null
          - unique

  - name: dim_status
    description: "Trial status dimension with completion/abandonment flags."
    columns:
      - name: status_id
        data_tests:
          - not_null
          - unique

  - name: dim_phase
    description: "Clinical trial phase dimension."
    columns:
      - name: phase_id
        data_tests:
          - not_null
          - unique

  - name: dim_sponsor
    description: "Sponsor dimension (class + name)."
    columns:
      - name: sponsor_id
        data_tests:
          - not_null
          - unique

  - name: dim_condition
    description: "Medical condition / therapeutic area dimension with normalized names."
    columns:
      - name: condition_id
        data_tests:
          - not_null
          - unique
      - name: condition_name_raw
        description: "Original condition name from ClinicalTrials.gov."
      - name: condition_name_normalized
        description: "Normalized condition name (deduplicated via seed)."

  - name: dim_country
    description: "Country dimension."
    columns:
      - name: country_id
        data_tests:
          - not_null
          - unique

  - name: dim_intervention_type
    description: "Intervention type dimension (drug, device, etc.)."
    columns:
      - name: intervention_type_id
        data_tests:
          - not_null
          - unique

  - name: fct_clinical_trials
    description: "Fact table: one row per clinical trial with metrics and dimension FKs."
    columns:
      - name: nct_id
        data_tests:
          - not_null
          - unique
      - name: status_id
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_status')
              field: status_id
      - name: sponsor_id
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_sponsor')
              field: sponsor_id
      - name: date_id_start
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_id
      - name: date_id_completion
        data_tests:
          - relationships:
              to: ref('dim_date')
              field: date_id
      - name: date_id_primary_completion
        data_tests:
          - relationships:
              to: ref('dim_date')
              field: date_id
      - name: date_id_first_posted
        data_tests:
          - relationships:
              to: ref('dim_date')
              field: date_id
      - name: enrollment_count
        description: "Number of enrolled participants. Some trials do not report this."
      - name: duration_days
        description: "Trial duration in days (completion_date - start_date)."

  - name: brg_trial_intervention
    description: "Bridge table linking clinical trials to intervention types."
    columns:
      - name: nct_id
        data_tests:
          - not_null
          - relationships:
              to: ref('fct_clinical_trials')
              field: nct_id
      - name: intervention_type_id
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_intervention_type')
              field: intervention_type_id

  - name: brg_trial_condition
    description: "Bridge table linking clinical trials to medical conditions."
    columns:
      - name: nct_id
        data_tests:
          - not_null
          - relationships:
              to: ref('fct_clinical_trials')
              field: nct_id
      - name: condition_id
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_condition')
              field: condition_id

  - name: brg_trial_country
    description: "Bridge table linking clinical trials to countries."
    columns:
      - name: nct_id
        data_tests:
          - not_null
          - relationships:
              to: ref('fct_clinical_trials')
              field: nct_id
      - name: country_id
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_country')
              field: country_id

  - name: brg_trial_phase
    description: "Bridge table linking clinical trials to trial phases."
    columns:
      - name: nct_id
        data_tests:
          - not_null
          - relationships:
              to: ref('fct_clinical_trials')
              field: nct_id
      - name: phase_id
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_phase')
              field: phase_id